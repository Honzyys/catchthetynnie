<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Scared Tynnie</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            position: relative;
        }

        #game-canvas {
            flex: 3;
            position: relative;
            background: #34495e;
            overflow: hidden;
            cursor: crosshair;
            display: none;
            flex-direction: column;
        }

        #cursor-cleaner {
            position: absolute;
            width: 100px;
            pointer-events: none;
            z-index: 100;
        }

        #target-wrapper {
            position: absolute;
            width: 150px;
            height: 150px;
            transition: left 1.5s linear, top 1.5s linear;
            z-index: 50;
            cursor: pointer;
        }

        #target {
            width: 100%;
            height: 100%;
        }

        #water-splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('voda.png') center/cover;
            display: none;
            pointer-events: none;
        }

        #sidebar {
            flex: 1;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-left: 4px solid #f1c40f;
            overflow-y: auto;
            display: none;
        }

        .stat-box {
            font-size: 24px;
            margin-bottom: 20px;
            color: #f1c40f;
            position: relative;
            z-index: 10;
        }

        .shop-item {
            background: #444;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 5px;
            font-weight: bold;
        }

        button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        #menu-screen {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            flex-direction: column;
            gap: 30px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
        }

        #menu-screen h1 {
            font-size: 72px;
            margin: 0;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.8);
        }

        #menu-screen p {
            font-size: 24px;
            margin: 0;
            color: #bdc3c7;
        }

        #play-button {
            padding: 20px 60px;
            font-size: 28px;
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }

        #play-button:hover {
            background: #f39c12;
            transform: scale(1.05);
        }

        #login-screen {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
        }

        #login-screen h1 {
            font-size: 48px;
            margin: 0 0 30px 0;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.8);
        }

        .login-form {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #555;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .login-form input::placeholder {
            color: #bdc3c7;
        }

        #login-btn,
        #register-btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 5px;
        }

        #login-btn:hover,
        #register-btn:hover {
            background: #f39c12;
            transform: scale(1.02);
        }

        .form-toggle {
            text-align: center;
            margin-top: 15px;
            color: #bdc3c7;
            font-size: 14px;
        }

        .form-toggle a {
            color: #f1c40f;
            cursor: pointer;
            text-decoration: underline;
        }

        .form-toggle a:hover {
            color: #f39c12;
        }

        .form-error {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #register-form {
            display: none;
        }

        .guest-section {
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid #555;
            padding-top: 20px;
        }

        #guest-btn {
            padding: 12px 30px;
            font-size: 16px;
            background: #95a5a6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }

        #guest-btn:hover {
            background: #7f8c8d;
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <h1>CATCH TYNNIE!</h1>

        <div id="login-form" class="login-form">
            <div class="form-error" id="login-error"></div>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">LOGIN</button>
            <div class="form-toggle">New player? <a onclick="switchToRegister()">Create account</a></div>
        </div>

        <div id="register-form" class="login-form">
            <div class="form-error" id="register-error"></div>
            <input type="text" id="register-username" placeholder="Username">
            <input type="password" id="register-password" placeholder="Password">
            <input type="password" id="register-password-confirm" placeholder="Confirm password">
            <button id="register-btn">CREATE ACCOUNT</button>
            <div class="form-toggle">Already have an account? <a onclick="switchToLogin()">Login</a></div>
        </div>

        <div class="guest-section">
            <p style="color: #bdc3c7; margin: 0 0 15px 0;">Or play without an account</p>
            <button id="guest-btn">PLAY AS GUEST</button>
        </div>
    </div>

    <div id="menu-screen">
        <h1>CATCH TYNNIE!</h1>
        <p>Click to terrify!</p>
        <button id="play-button">PLAY</button>
    </div>

    <div id="game-canvas">
        <div class="stat-box" style="padding: 20px;">Body: <span id="score">0</span></div>
        <img src="lukas.png" id="cursor-cleaner">

        <div id="target-wrapper">
            <img src="lukas.png" id="target">
            <div id="water-splash"></div>
        </div>
    </div>

    <div id="sidebar">
        <h2>SHOP</h2>
        <div id="shop"></div>
    </div>

    <script>
        let score = 0;
        let power = 1;
        let canSplash = false;
        let currentPlayer = null;

        const wrapper = document.getElementById('target-wrapper');
        const targetImg = document.getElementById('target');
        const cursorImg = document.getElementById('cursor-cleaner');
        const splashEl = document.getElementById('water-splash');
        const scoreEl = document.getElementById('score');
        const shop = document.getElementById('shop');
        const menuScreen = document.getElementById('menu-screen');
        const gameCanvas = document.getElementById('game-canvas');
        const playButton = document.getElementById('play-button');
        const sidebar = document.getElementById('sidebar');
        const loginScreen = document.getElementById('login-screen');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        const registerUsername = document.getElementById('register-username');
        const registerPassword = document.getElementById('register-password');
        const registerPasswordConfirm = document.getElementById('register-password-confirm');
        const loginError = document.getElementById('login-error');
        const registerError = document.getElementById('register-error');
        const guestBtn = document.getElementById('guest-btn');

        const clickSound = new Audio('uwu.mp3');
        const splashSound = new Audio('zvuk_vody.mp3');

        const outfits = [
            { name: "Upgrade 1", cost: 20, power: 2, targetImg: "lukas.png", cursorImg: null, clickSound: 'uwu_pitched.mp3' },
            { name: "Upgrade 2 - Fuck skill", cost: 50, power: 5, targetImg: "lukas.png", cursorImg: null, clickSound: null },
            { name: "Upgrade 3 - Lukas hand", cost: 100, power: 10, targetImg: "lukas.png", cursorImg: "lukas_ruka.png", clickSound: null }
        ];

        // localStorage functions
        function saveProgress() {
            if (currentPlayer) {
                const playerData = {
                    score: score,
                    power: power,
                    canSplash: canSplash
                };
                localStorage.setItem(`player_${currentPlayer}`, JSON.stringify(playerData));
            }
        }

        function loadProgress(playerName) {
            const savedData = localStorage.getItem(`player_${playerName}`);
            if (savedData) {
                const playerData = JSON.parse(savedData);
                score = playerData.score;
                power = playerData.power;
                canSplash = playerData.canSplash;
                scoreEl.innerText = score;
                return true;
            }
            return false;
        }

        function getUserData(username) {
            return localStorage.getItem(`user_${username}`);
        }

        function saveUserData(username, password) {
            const userData = { password: btoa(password) };
            localStorage.setItem(`user_${username}`, JSON.stringify(userData));
        }

        function verifyPassword(username, password) {
            const userData = localStorage.getItem(`user_${username}`);
            if (userData) {
                const parsed = JSON.parse(userData);
                return parsed.password === btoa(password);
            }
            return false;
        }

        function userExists(username) {
            return localStorage.getItem(`user_${username}`) !== null;
        }

        function switchToRegister() {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            loginError.innerText = '';
            registerError.innerText = '';
        }

        function switchToLogin() {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginError.innerText = '';
            registerError.innerText = '';
        }

        // Login handler
        loginBtn.addEventListener('click', () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value;

            if (username === '') {
                loginError.innerText = 'Please enter username';
                return;
            }
            if (password === '') {
                loginError.innerText = 'Please enter password';
                return;
            }

            if (!userExists(username)) {
                loginError.innerText = 'User not found';
                return;
            }

            if (!verifyPassword(username, password)) {
                loginError.innerText = 'Incorrect password';
                return;
            }

            currentPlayer = username;
            // Load existing progress if available
            loadProgress(username);
            renderShop();
            startGame();
        });

        // Register handler
        registerBtn.addEventListener('click', () => {
            const username = registerUsername.value.trim();
            const password = registerPassword.value;
            const passwordConfirm = registerPasswordConfirm.value;

            if (username === '') {
                registerError.innerText = 'Please enter username';
                return;
            }
            if (username.length < 3) {
                registerError.innerText = 'Username must be at least 3 characters';
                return;
            }
            if (password === '') {
                registerError.innerText = 'Please enter password';
                return;
            }
            if (password.length < 3) {
                registerError.innerText = 'Password must be at least 3 characters';
                return;
            }
            if (password !== passwordConfirm) {
                registerError.innerText = 'Passwords do not match';
                return;
            }
            if (userExists(username)) {
                registerError.innerText = 'Username already exists';
                return;
            }

            // Create account
            saveUserData(username, password);
            currentPlayer = username;
            renderShop();
            startGame();
        });

        // Allow Enter key to login/register
        loginPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
        registerPasswordConfirm.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                registerBtn.click();
            }
        });

        // Guest button click handler
        guestBtn.addEventListener('click', () => {
            currentPlayer = 'guest';
            score = 0;
            power = 1;
            canSplash = false;
            scoreEl.innerText = score;
            renderShop();
            startGame();
        });

        // Play button click handler
        playButton.addEventListener('click', () => {
            menuScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
        });

        // Function to start game
        function startGame() {
            loginScreen.style.display = 'none';
            gameCanvas.style.display = 'flex';
            sidebar.style.display = 'block';
        }

        document.getElementById('game-canvas').addEventListener('mousemove', (e) => {
            cursorImg.style.left = (e.clientX - 50) + 'px';
            cursorImg.style.top = (e.clientY - 50) + 'px';
        });

        function moveTarget() {
            const gameCanvas = document.getElementById('game-canvas');
            const maxX = gameCanvas.clientWidth - 150;
            const maxY = gameCanvas.clientHeight - 150;

            wrapper.style.left = Math.random() * maxX + "px";
            wrapper.style.top = Math.random() * maxY + "px";
        }

        wrapper.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            score += power;
            scoreEl.innerText = score;

            if (canSplash) {
                splashEl.style.display = 'block';
                splashSound.currentTime = 0;
                splashSound.play();
                setTimeout(() => { splashEl.style.display = 'none'; }, 3000);
            } else {
                clickSound.currentTime = 0;
                clickSound.play();
            }

            moveTarget();
            saveProgress();
            renderShop();
        });

        window.buyOutfit = (index) => {
            const outfit = outfits[index];
            if (score >= outfit.cost) {
                score -= outfit.cost;
                power = outfit.power;

                // Změnit vzhled TARGETU
                if (outfit.targetImg) {
                    targetImg.src = outfit.targetImg;
                }

                // Změnit vzhled CURSORU
                if (outfit.cursorImg) {
                    cursorImg.src = outfit.cursorImg;
                }

                // Změnit zvuk KLIKNUTÍ
                if (outfit.clickSound) {
                    clickSound.src = outfit.clickSound;
                }

                if (index === 1) canSplash = true;
                scoreEl.innerText = score;
                saveProgress();
                renderShop();
            }
        };

        function renderShop() {
            shop.innerHTML = '';
            outfits.forEach((outfit, index) => {
                const disabled = score < outfit.cost ? 'disabled' : '';
                shop.innerHTML += `
                    <div class='shop-item'>
                        <strong>${outfit.name}</strong> (+${outfit.power} Power)<br>
                        <button onclick="buyOutfit(${index})" ${disabled}>
                            Koupit za ${outfit.cost} bodů
                        </button>
                    </div>`;
            });
        }

        // Initialize sounds and images from default state (before any upgrades)
        clickSound.src = 'uwu.mp3';
        targetImg.src = 'lukas.png';

        // Show play screen on startup
        menuScreen.style.display = 'flex';

        setInterval(moveTarget, 1600);
        renderShop();
    </script>
</body>

</html>
